<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot IA + Imágenes</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/@fontsource/fira-code@4.0.0/css.min.css" rel="stylesheet">
    <script src="https://js.puter.com/v2/"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 Chat IA Avanzado</h1>
            <p>Escribe y genera imágenes con IA</p>
        </header>

        <main>
            <div class="chat-box" id="chat-box"></div>
            
            <div class="input-box">
                <input type="text" id="user-input" placeholder="Escribe tu mensaje o prompt para imagen...">
                <div class="button-group">
                    <button id="send-btn">Enviar</button>
                    <button id="image-btn">🖼️ Generar</button>
                </div>
            </div>
        </main>

        <footer>
            <p>Powered by <a href="https://yordandevzd.github.io" target="_blank">YordanDev</a></p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
