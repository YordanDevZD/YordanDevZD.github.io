<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Grabaciones Yordan - Catalogo</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header>

            <h1>Grabaciones Yordan</h1>

            <nav>
                <ul>
                    <li><a href="#series">Series</a></li>

                    <li><a href="#novelas">Novelas</a></li>
                </ul>
            </nav>
        </div>

    <main class="container">
        <section id="series">
            <h2>Series</h2>
            <div class="catalogo" data-categoria="series"></div>

        <section id="peliculas">
            <h2>Películas</h2>

        <section id="shows">
            <h2>Shows</h2>

        </section>
        <section id="novelas">
            <h2>Novelas</h2>

    </main>

    <footer>
        <div class="container">
