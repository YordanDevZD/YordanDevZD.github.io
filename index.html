<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puter.js + Telegram Bot</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://js.puter.com/v2/"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 Bot de Telegram con Puter.js</h1>
            <p>Interactúa con IA directamente desde Telegram.</p>
        </header>

        <main>
            <div class="chat-box" id="chat-box">
                <!-- Mensajes del chat aparecerán aquí -->
            </div>

            <div class="input-box">
                <input type="text" id="user-input" placeholder="Escribe tu mensaje...">
                <button id="send-btn">Enviar</button>
            </div>
        </main>

        <footer>
            <p>Desarrollado por <a href="https://yordandevzd.github.io" target="_blank">YordanDev</a></p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
